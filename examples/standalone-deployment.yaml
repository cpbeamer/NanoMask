# Example: NanoMask as a centralized gateway
#
# Deploys NanoMask as a standalone Deployment with a Service and Ingress.
# All application pods route traffic through this central proxy instead of
# running NanoMask as a per-pod sidecar.
#
# Usage:
#   kubectl apply -f examples/standalone-deployment.yaml
#
# NanoMask performs inline redaction for JSON and text payloads.
# Common binary formats such as PDF, image/*, audio/*, video/*, and octet-stream bodies are bypassed unchanged.
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanomask-gateway
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nanomask
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nanomask
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: nanomask
          image: nanomask:0.1.0
          # Default payload policy: reject unsupported request bodies, bypass unsupported upstream responses.
          env:
            - name: NANOMASK_LISTEN_HOST
              value: "0.0.0.0"
            - name: NANOMASK_LISTEN_PORT
              value: "8081"
            - name: NANOMASK_TARGET_HOST
              value: api.openai.com
            - name: NANOMASK_TARGET_PORT
              value: "443"
            - name: NANOMASK_TARGET_TLS
              value: "true"
            - name: NANOMASK_UNSUPPORTED_REQUEST_BODY_BEHAVIOR
              value: "reject"
            - name: NANOMASK_UNSUPPORTED_RESPONSE_BODY_BEHAVIOR
              value: "bypass"
            - name: NANOMASK_LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: nanomask-gateway
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8081"
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nanomask-gateway
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
  annotations:
    # Adjust the ingress class for your cluster (nginx, alb, traefik, etc.)
spec:
  ingressClassName: nginx
  rules:
    - host: nanomask.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nanomask-gateway
                port:
                  name: http
