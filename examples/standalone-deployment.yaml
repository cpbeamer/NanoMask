# Example: NanoMask as a centralized gateway
#
# Deploys NanoMask as a standalone Deployment with a Service and Ingress.
# All application pods route traffic through this central proxy instead of
# running NanoMask as a per-pod sidecar.
#
# Usage:
#   kubectl apply -f examples/standalone-deployment.yaml
# For healthcare-focused starter assets, see starters/healthcare/deployments/.
#
# NanoMask performs inline redaction for JSON and text payloads.
# Common binary formats such as PDF, image/*, audio/*, video/*, and octet-stream bodies are bypassed unchanged.
# It does not perform OCR or parse generic files directly; send OCR-derived text or JSON through the gateway.
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanomask-gateway
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nanomask
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nanomask
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: nanomask
          image: nanomask:0.1.0
          # Default payload policy: reject unsupported request bodies, bypass unsupported upstream responses.
          env:
            - name: NANOMASK_LISTEN_HOST
              value: "0.0.0.0"
            - name: NANOMASK_LISTEN_PORT
              value: "8081"
            - name: NANOMASK_TARGET_HOST
              value: api.openai.com
            - name: NANOMASK_TARGET_PORT
              value: "443"
            - name: NANOMASK_TARGET_TLS
              value: "true"
            - name: NANOMASK_UNSUPPORTED_REQUEST_BODY_BEHAVIOR
              value: "reject"
            - name: NANOMASK_UNSUPPORTED_RESPONSE_BODY_BEHAVIOR
              value: "bypass"
            - name: NANOMASK_LOG_LEVEL
              value: info
            - name: NANOMASK_AUDIT_LOG
              value: "true"
            - name: NANOMASK_ENABLE_EMAIL
              value: "true"
            - name: NANOMASK_ENABLE_PHONE
              value: "true"
            - name: NANOMASK_ENABLE_CREDIT_CARD
              value: "true"
            - name: NANOMASK_ENABLE_IP
              value: "true"
            - name: NANOMASK_ENABLE_HEALTHCARE
              value: "true"
            - name: NANOMASK_ENTITY_FILE
              value: /etc/nanomask/entities/entities.txt
            - name: NANOMASK_WATCH_INTERVAL
              value: "1000"
            - name: NANOMASK_SCHEMA_FILE
              value: /etc/nanomask/schema/schema.nmschema
            - name: NANOMASK_SCHEMA_DEFAULT
              value: KEEP
            - name: NANOMASK_HASH_KEY_FILE
              value: /etc/nanomask/hash/hash-key.txt
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: entities
              mountPath: /etc/nanomask/entities
              readOnly: true
            - name: schema
              mountPath: /etc/nanomask/schema
              readOnly: true
            - name: hash
              mountPath: /etc/nanomask/hash
              readOnly: true
      volumes:
        - name: entities
          configMap:
            name: nanomask-gateway-entities
        - name: schema
          configMap:
            name: nanomask-gateway-schema
        - name: hash
          secret:
            secretName: nanomask-gateway-hash
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nanomask-gateway-entities
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
data:
  entities.txt: |
    Jane Smith
    John Doe
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nanomask-gateway-schema
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
data:
  schema.nmschema: |
    schema.name = gateway_example
    schema.version = 2026-03-09
    schema.default = KEEP
    patient_name = KEEP
    patient_email = REDACT
    patient_phone = REDACT
    patient_id = HASH
    notes = SCAN
---
apiVersion: v1
kind: Secret
metadata:
  name: nanomask-gateway-hash
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  hash-key.txt: |
    0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
---
apiVersion: v1
kind: Service
metadata:
  name: nanomask-gateway
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8081"
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
---
# ── Ingress with TLS termination (recommended production architecture) ───────
#
# NanoMask's recommended production TLS strategy is to terminate TLS at
# the ingress tier (NGINX, Envoy, ALB, Traefik) and run NanoMask as a
# plaintext HTTP service behind it. This gives you:
#   - Full cipher suite coverage (TLS 1.2 + 1.3)
#   - Automated certificate management via cert-manager / ACM / Let's Encrypt
#   - OCSP stapling, session resumption, and client certificate auth
#   - A security posture buyers recognize without additional review
#
# For development or edge deployments without an ingress tier, NanoMask
# also supports built-in TLS 1.3 via --tls-cert and --tls-key flags.
# See docs/tls_strategy.md for the full strategy document.
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nanomask-gateway
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
  annotations:
    # Adjust the ingress class for your cluster (nginx, alb, traefik, etc.)
    # For cert-manager automated TLS, add:
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nanomask.internal.example.com
      secretName: nanomask-gateway-tls
  rules:
    - host: nanomask.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nanomask-gateway
                port:
                  name: http
---
# ── TLS certificate Secret ──────────────────────────────────────────────────
# Option 1: Let cert-manager provision it automatically.
#   Add the annotation  cert-manager.io/cluster-issuer: letsencrypt-prod
#   to the Ingress above and delete this Secret — cert-manager creates it.
#
# Option 2: Create manually with a self-signed certificate:
#   openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
#     -keyout tls.key -out tls.crt -days 365 -nodes \
#     -subj "/CN=nanomask.internal.example.com"
#   kubectl create secret tls nanomask-gateway-tls \
#     --cert=tls.crt --key=tls.key
#
# ⚠️  Do NOT apply this Secret as-is — the placeholder values below are
#     intentionally invalid. Replace them or use one of the options above.
apiVersion: v1
kind: Secret
metadata:
  name: nanomask-gateway-tls
  labels:
    app.kubernetes.io/name: nanomask
    app.kubernetes.io/component: gateway
type: kubernetes.io/tls
data:
  # Base64-encoded PEM certificate and key — replace with real values
  tls.crt: "REPLACE_WITH_BASE64_ENCODED_CERTIFICATE"
  tls.key: "REPLACE_WITH_BASE64_ENCODED_PRIVATE_KEY"
