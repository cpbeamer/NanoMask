{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nanomask.fullname" . }}
  labels:
    {{- include "nanomask.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nanomask.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Allow inbound traffic to the proxy port from any source.
    - ports:
        - port: {{ .Values.proxy.listenPort }}
          protocol: TCP
  egress:
    # Allow DNS resolution (kube-dns / CoreDNS).
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic to the configured upstream target.
    - ports:
        - port: {{ .Values.proxy.targetPort }}
          protocol: TCP
      {{- if .Values.networkPolicy.egressCIDR }}
      to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.egressCIDR }}
      {{- end }}
{{- end }}
