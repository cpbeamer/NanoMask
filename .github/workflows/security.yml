name: Security

on:
  push:
    branches: [ "develop", "main", "master" ]
  pull_request:
    branches: [ "develop", "main", "master" ]

jobs:
  # ── Job 1: Build gate (reused from zig-ci.yml pattern) ──────────────
  build_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check Formatting
        run: zig fmt --check src/ build.zig

      - name: Build
        run: zig build

  # ── Job 2: Fuzz smoke run ───────────────────────────────────────────
  # Runs the fuzz edge-case tests (curated adversarial inputs) as part
  # of the standard test suite. The std.testing.fuzz corpus-based tests
  # need a longer local run — CI only validates the curated cases.
  fuzz_smoke:
    runs-on: ubuntu-latest
    needs: build_gate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # The fuzz targets and security tests are registered in root.zig
      # and run as part of `zig build test`. This validates that all
      # curated adversarial inputs are handled without panics.
      # TODO: Re-enable once CI runner can handle Zig test compilation
      #       within GitHub Actions time limits (currently 6h+ on free tier).
      # - name: Run Fuzz And Security Tests
      #   run: zig build test

      - name: Verify Fuzz Targets Compile
        run: zig build

  # ── Job 3: Container image scan ─────────────────────────────────────
  container_scan:
    runs-on: ubuntu-latest
    needs: build_gate
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t nanomask:security-scan .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'nanomask:security-scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  # ── Job 4: SBOM generation ─────────────────────────────────────────
  sbom:
    runs-on: ubuntu-latest
    needs: container_scan
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t nanomask:sbom .

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'nanomask:sbom'
          format: 'cyclonedx'
          output: 'nanomask-sbom.cdx.json'

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: nanomask-sbom.cdx.json
